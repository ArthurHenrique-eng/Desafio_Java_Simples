<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Completa</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #e5e7eb;
            color: #111827;
            padding: 16px;
        }

        .container {
            width: min(100%, 360px);
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.1);
            padding: 18px;
        }

        h1 {
            text-align: center;
            margin-bottom: 12px;
            font-size: 1.35rem;
        }

        #display {
            width: 100%;
            height: 58px;
            font-size: 1.45rem;
            text-align: right;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 12px;
        }

        .teclado {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 14px 0;
            font-size: 1.05rem;
            cursor: pointer;
            background: #f3f4f6;
        }

        button.operador {
            background: #dbeafe;
        }

        button.acao {
            background: #fee2e2;
        }

        button.igual {
            background: #bbf7d0;
        }

        .rodape {
            margin-top: 12px;
            text-align: center;
        }

        .rodape a {
            text-decoration: none;
            color: #1d4ed8;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="container">
        <h1>Calculadora Completa</h1>
        <input id="display" type="text" readonly aria-label="visor da calculadora">
        <div class="teclado">
            <button class="acao" data-valor="C">C</button>
            <button class="acao" data-valor="DEL">DEL</button>
            <button class="operador" data-valor="%">%</button>
            <button class="operador" data-valor="/">/</button>
            <button data-valor="7">7</button>
            <button data-valor="8">8</button>
            <button data-valor="9">9</button>
            <button class="operador" data-valor="*">*</button>
            <button data-valor="4">4</button>
            <button data-valor="5">5</button>
            <button data-valor="6">6</button>
            <button class="operador" data-valor="-">-</button>
            <button data-valor="1">1</button>
            <button data-valor="2">2</button>
            <button data-valor="3">3</button>
            <button class="operador" data-valor="+">+</button>
            <button data-valor="0">0</button>
            <button data-valor=".">.</button>
            <button data-valor="(">(</button>
            <button data-valor=")">)</button>
            <button class="igual" data-valor="=" style="grid-column: 1 / -1;">=</button>
        </div>
        <p class="rodape"><a href="index.html">Voltar para o menu</a></p>
    </main>
</body>
<script src="calculadoraSimples.js"></script>
</html>
