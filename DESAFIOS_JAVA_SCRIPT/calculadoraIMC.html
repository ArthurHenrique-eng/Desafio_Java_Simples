<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IMC</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f1f5f9;
            color: #0f172a;
            padding: 16px;
        }

        .card {
            width: min(100%, 420px);
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
            padding: 24px;
        }

        h1 {
            text-align: center;
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin: 10px 0 6px;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
        }

        button {
            width: 100%;
            margin-top: 14px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: #fff;
            padding: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        #resultado {
            margin-top: 14px;
            text-align: center;
            font-size: 1.05rem;
            min-height: 24px;
        }

        .voltar {
            margin-top: 16px;
            text-align: center;
        }

        .voltar a {
            text-decoration: none;
            color: #1d4ed8;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Calculadora IMC</h1>
        <label for="peso">Peso (kg)</label>
        <input id="peso" type="number" step="0.1" min="1" placeholder="Ex.: 70">
        <label for="altura">Altura (m)</label>
        <input id="altura" type="number" step="0.01" min="0.5" placeholder="Ex.: 1.75">
        <button id="calcular">Calcular IMC</button>
        <p id="resultado"></p>
        <p class="voltar"><a href="index.html">Voltar para o menu</a></p>
    </main>
    <script src="calculadoraIMC.js"></script>
</body>
</html>
